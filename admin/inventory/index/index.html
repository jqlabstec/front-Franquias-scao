<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produtos</title>
  <link rel="stylesheet" href="../../../saidbar/saidebar.css" />
  <link rel="stylesheet" href="./index.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>window.SIDEBAR_ACTIVE = 'products-list';</script>
  <script src="../../../saidbar/saidebar.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="./index.js" defer></script>
</head>

<body>
  <div class="app-layout">
    <aside id="sidebar-root"></aside>
    <div class="app-content">
      <main class="shell">

        <section class="card">
          <div class="card-head">
            <h1>📦 Estoque</h1>
            <a href="../products/create/index.html" class="btn-primary">+ Novo Produto</a>
          </div>

          <form id="filterForm" class="filters">
            <input type="text" id="q" placeholder="Buscar por nome ou NCM..." />

            <!-- ✅ Filtro por categoria -->
            <select id="categoryFilter">
              <option value="">Todas as categorias</option>
              <option value="Hortifruti">🥦 Hortifruti</option>
              <option value="Cozinha">🍳 Cozinha</option>
              <option value="Congelados e Atacado">🧊 Congelados e Atacado</option>
              <option value="Descartáveis e Bebidas">🧃 Descartáveis e Bebidas</option>
            </select>

            <button type="submit" class="btn-primary">🔍 Buscar</button>
            <button type="button" id="clearBtn" class="btn-ghost">Limpar</button>
          </form>

          <div class="card-head">
            <h1>Estoque • Listagem</h1>
            <div style="display:flex;gap:8px;">
              <button id="btnDownloadTemplate" class="btn-ghost" type="button">📥 Baixar Modelo</button>
              <button id="btnImportExcel" class="btn-primary" type="button">📤 Importar Planilha</button>
            </div>
          </div>

          <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" />

          <div id="status" class="banner hidden"></div>

          <div class="table-wrap" style="overflow-x: auto;">
            <table class="tbl" style="min-width: 1100px;">
              <thead>
                <tr>
                  <th class="text-left">Produto</th>
                  <th>Categoria</th><!-- ✅ -->
                  <th>Unidade</th>
                  <th class="text-right">Saldo Atual</th>
                  <th class="text-right">Mínimo</th>
                  <th class="text-right">Entradas (Compras)</th>
                  <th class="text-right">Saídas (Vendas)</th>
                  <th class="text-right">Ajustes +</th>
                  <th class="text-right">Ajustes −</th>
                  <th class="text-right">Custo Médio</th>
                  <th class="text-center">Ações</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr><td colspan="11" class="muted">Carregando...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="pagination">
            <button id="prevBtn" class="btn-ghost">← Anterior</button>
            <span id="pageInfo">-</span>
            <button id="nextBtn" class="btn-ghost">Próxima →</button>
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- MODAL DE EDIÇÃO -->
  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>✏️ Editar Produto</h2>
        <button id="closeModalBtn" class="btn-close">×</button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="editProductId" />

        <div class="field">
          <label>Nome *</label>
          <input type="text" id="editName" required />
        </div>

        <div class="field">
          <label>Código *</label>
          <input type="text" id="editCode" required />
        </div>

        <!-- ✅ Campo categoria no modal -->
        <div class="field">
          <label>Categoria</label>
          <select id="editCategory">
            <option value="">— Sem categoria —</option>
            <option value="Hortifruti">🥦 Hortifruti</option>
            <option value="Cozinha">🍳 Cozinha</option>
            <option value="Congelados e Atacado">🧊 Congelados e Atacado</option>
            <option value="Descartáveis e Bebidas">🧃 Descartáveis e Bebidas</option>
          </select>
        </div>

        <div class="field">
          <label>Unidade de Medida *</label>
          <input type="text" id="editUnitOfMeasure" required />
        </div>

        <div class="field">
          <label>Custo Unitário *</label>
          <input type="number" id="editCurrentCostPerUnit" step="0.0001" required />
        </div>

        <div class="field">
          <label>NCM</label>
          <input type="text" id="editNcm" />
        </div>

        <div class="field">
          <label>Estoque Mínimo</label>
          <input type="number" id="editMinQty" step="0.01" />
        </div>

        <div class="field">
          <label>Lead Time (dias)</label>
          <input type="number" id="editLeadTimeDays" />
        </div>

        <div class="field">
          <label>Consumo Médio Diário</label>
          <input type="number" id="editAvgDailyUse" step="0.01" />
        </div>
      </div>

      <div class="modal-footer">
        <button id="cancelEditBtn" class="btn-ghost">Cancelar</button>
        <button id="saveProductBtn" class="btn-primary">💾 Salvar</button>
      </div>
    </div>
  </div>

</body>

</html>
